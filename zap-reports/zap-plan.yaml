env:
  contexts:
    - name: "juice-shop"
      urls:
        - "http://juice-shop:3000"
      includePaths: []
      # Tell ZAP to NEVER scan or click on the logout path to avoid losing the session
      excludePaths:
      - "http://juice-shop:3000/rest/user/logout"
      # Define Authentication Strategy (Juice Shop uses JSON authentication)
      authentication:
        method: "json"
        parameters:
          loginPageUrl: "http://juice-shop:3000/#/login"
          loginRequestUri: "http://juice-shop:3000/rest/user/login"
          loginRequestBody: '{"email":"{%username%}","password":"{%password%}"}'# How ZAP verifies if the login was successful by looking at the response body
        verification:
          method: "response"
          loggedOutRegex: "401 Unauthorized"
          loggedInRegex: ".*token.*"
      # Define the Users
      users:
      - name: "admin-user"
        credentials:
          # Default Juice Shop admin credentials
          username: "admin@juice-sh.op"
          password: "admin123"
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
  # Step 1: Discover pages in the application (Spider)
  - type: spider
    parameters:
      context: "juice-shop"
      user: "admin-user"  # This tells Spider to run as Admin
      url: "http://juice-shop:3000"
      maxDuration: 1
  # Step 2: Actively attack the discovered pages (Active Scan)
  - type: activeScan
    parameters:
      context: "juice-shop"
      user: "admin-user"  # This tells Active Scan to run as Admin
      # Don't let the active run forever! Limit each ruke to 1 minute
      maxRuleDurationInMins: 1
      # Don't let the active run forever! Limit the entire scan to 2 minutes
      maxScanDurationInMins: 2
    policyDefinition:
      # Set the overall intensity of the scan to "Low" to avoid overwhelming the target application and causing instability
      defaultStrength: Low
      # Set how easily ZAP will report a vuln.
      defaultThreshold: Medium

  # Step 3: Generate a readable HTML report
  # Can be traditional-html , risk-confidence-html , traditional-xml , and traditional-json
  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: zap-report.html
      reportTitle: "ZAP Automation Framework Report"
      reportDescription: "Results from ZAP Autoframework scan of Juice Shop"

  - type: report
    parameters:
      template: risk-confidence-html
      reportDir: /zap/wrk
      reportFile: risk-report.html
      reportTitle: "ZAP Risk/Confidence Report"